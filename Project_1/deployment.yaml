---
- name: Deploy Java Application
  hosts: all
  become: true
  tasks:
    - name: Create deployment directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: Copy artifact from Jenkins workspace
      copy:
        src: "/var/lib/jenkins/workspace/P1Jenkinspipeline/target/my-app-1.0.jar"
        dest: "{{ deploy_dir }}/my-app-1.0.jar"  # <--- Generic name here

    - name: Stop existing application (if running)
      shell: "pkill -f '[j]ava -jar {{ deploy_dir }}/my-app-1.0.jar'"
      register: stop_result
      failed_when: false
      changed_when: stop_result.rc == 0
